services:
  - type: web
    name: school-management-backend
    env: docker
    region: oregon
    plan: free
    repo: https://github.com/abuobernard/School-management-sytem
    branch: main
    dockerfile: Dockerfile
    buildCommand: cd School-backend && mvn clean package -DskipTests
    startCommand: java -jar target/School-management-sytem-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://${{RAILWAY_PRIVATE_DOMAIN}}:3306/school_management?useSSL=false&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${{MYSQL_ROOT_PASSWORD}}
        isSecret: true
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
